name: ci

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Test
        run: go test ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  node:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Syntax-check Node files
        run: |
          node --check npm/claude-statusline/bin/claude-statusline.js
          node --check scripts/build-npm.mjs

      - name: Build Go binary for shim test
        run: go build -o /tmp/claude-statusline .

      - name: Test npm shim
        run: |
          echo '{"model":{"display_name":"Claude"},"workspace":{"current_dir":"~"}}' |
          CLAUDE_STATUSLINE_BIN=/tmp/claude-statusline node npm/claude-statusline/bin/claude-statusline.js
