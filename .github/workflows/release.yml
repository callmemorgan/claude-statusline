name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Install cosign
        # No cosign-release pin: requesting a custom version trips the action's
        # release-pubkey digest self-check (exit 22). The installer default
        # installs cleanly, and the .goreleaser.yaml signing uses only
        # default-stable flags (--key/--bundle/--yes) that work across the
        # cosign 3.x versions the default may resolve to.
        uses: sigstore/cosign-installer@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          # Key-based cosign signing of checksums.txt (verified in-process by the
          # self-update path). COSIGN_PRIVATE_KEY is the cosign.key contents;
          # COSIGN_PASSWORD decrypts it. The matching cosign.pub is committed.
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}

      - name: Upload dist for npm packaging
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  npm-publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"               # current Node LTS; OIDC needs >= 22.14.0
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing
        # setup-node's bundled npm (10.x) predates OIDC trusted publishing;
        # the tokenless `npm publish` below needs npm >= 11.5.1.
        run: npm install -g npm@latest

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Build npm packages
        run: node scripts/build-npm.mjs ${{ github.ref_name }} dist/

      - name: Publish platform packages
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          for pkg in npm/@morgan.rebrand/claude-statusline-*/; do
            name="@morgan.rebrand/$(basename "$pkg")"
            if npm view "$name@$VERSION" >/dev/null 2>&1; then
              echo "Skipping $name@$VERSION (already published)"
            else
              npm publish --provenance --access public "$pkg"
            fi
          done

      - name: Publish main package
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          if npm view "@morgan.rebrand/claude-statusline@$VERSION" >/dev/null 2>&1; then
            echo "Skipping @morgan.rebrand/claude-statusline@$VERSION (already published)"
          else
            npm publish --provenance --access public npm/@morgan.rebrand/claude-statusline
          fi
