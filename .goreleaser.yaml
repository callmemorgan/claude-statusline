version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

# Key-based cosign signature over checksums.txt only. The binary embeds the
# matching public key (cosign.pub) and verifies this bundle in-process before
# trusting any digest, so the self-update path needs no cosign at runtime.
#
# scripts/sign-checksums.sh runs cosign, then NORMALIZES the bundle to the lean
# {"messageSignature":{"signature":"<base64 DER ECDSA>"}} shape. cosign's own
# --bundle output puts the signature under .base64Signature (legacy bundle) or
# .messageSignature.signature (newer sigstore bundle) depending on the resolved
# cosign version — a drift that has broken releases before. Normalizing makes the
# published bundle byte-stable across cosign versions AND readable by the
# already-deployed v1.2.0 verifier (which reads .messageSignature.signature).
# The in-process verifier ignores the Rekor tlog entry cosign records.
# Requires COSIGN_PRIVATE_KEY and COSIGN_PASSWORD in the release env.
signs:
  - cmd: ./scripts/sign-checksums.sh
    signature: "${artifact}.bundle"
    args:
      - "${artifact}"
      - "${signature}"
    artifacts: checksum

brews:
  - name: claude-statusline
    repository:
      owner: callmemorgan
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/callmemorgan/claude-statusline"
    description: "Statusline renderer for Claude Code and Antigravity CLI"
    test: |
      system "#{bin}/claude-statusline", "--help"
    install: |
      bin.install "claude-statusline"
    caveats: |
      To wire claude-statusline into Claude Code, run:
        claude-statusline install
      Customize anytime with:
        claude-statusline configure
    post_install: |
      gopath = ENV["GOPATH"] || "#{ENV["HOME"]}/go"
      go_bin = "#{gopath}/bin/claude-statusline"
      if File.exist?(go_bin)
        opoo "Detected another claude-statusline installation at #{go_bin}. Consider removing it to avoid PATH conflicts."
      end

      local_bin = "#{ENV["HOME"]}/.local/bin/claude-statusline"
      if File.exist?(local_bin)
        opoo "Detected another claude-statusline installation at #{local_bin}. Consider removing it to avoid PATH conflicts."
      end
